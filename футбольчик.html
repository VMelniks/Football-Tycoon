<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Football Tycoon: Max Level Edition</title>
    <style>
      body {
        background: #0d1f0d;
        color: white;
        font-family: "Segoe UI", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        user-select: none;
      }
      .container {
        text-align: center;
        width: 800px;
      }
      .screen {
        display: none;
      }
      .active {
        display: block;
      }

      .currency-bar {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin-bottom: 10px;
        background: rgba(0, 0, 0, 0.3);
        padding: 10px;
        border-radius: 50px;
      }
      .xp-display {
        font-size: 1.5rem;
        color: #3498db;
        font-weight: bold;
      }
      .coin-display {
        font-size: 1.5rem;
        color: #f1c40f;
        font-weight: bold;
      }

      .tree-viewport {
        position: relative;
        height: 500px;
        width: 750px;
        margin: 10px auto;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 20px;
        border: 2px solid #2ecc71;
      }

      .skill-node {
        position: absolute;
        width: 80px;
        height: 80px;
        background: #27ae60;
        color: white;
        border: 3px solid #0d1f0d;
        border-radius: 15px;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
        z-index: 5;
      }
      .skill-node.visible {
        display: flex;
      }
      .skill-node.disabled {
        background: #333;
        opacity: 0.4;
        cursor: not-allowed;
      }
      .skill-node.maxed {
        background: #f1c40f;
        color: #000;
        border-color: #fff;
        cursor: default;
      }

      .skill-node small {
        font-size: 0.5rem;
        text-transform: uppercase;
      }
      .skill-node span {
        font-size: 0.9rem;
      }
      .price-xp {
        color: #3498db !important;
        font-size: 0.75rem;
      }
      .price-coin {
        color: #f1c40f !important;
        font-size: 0.75rem;
      }

      /* Позиции узлов */
      #node-click {
        left: 335px;
        top: 400px;
      }
      #node-crit {
        left: 480px;
        top: 350px;
      }
      #node-delay {
        left: 600px;
        top: 250px;
      }
      #node-time {
        left: 600px;
        top: 120px;
      }

      #node-auto {
        left: 200px;
        top: 350px;
      }
      #node-pro {
        left: 100px;
        top: 250px;
      }

      #node-viewer {
        left: 335px;
        top: 280px;
      }
      #node-fan {
        left: 335px;
        top: 160px;
      }
      #node-attr {
        left: 250px;
        top: 50px;
      }
      #node-drink {
        left: 420px;
        top: 50px;
      }

      .line {
        position: absolute;
        background: #2ecc71;
        z-index: 1;
        display: none;
        opacity: 0.2;
      }
      .line.visible {
        display: block;
      }

      /* Игра */
      #game-screen {
        background: #1a4a1a;
        border-radius: 20px;
        padding: 25px;
        border: 4px solid #2ecc71;
      }
      #kick-me {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: white;
        font-size: 3.5rem;
        border: none;
        cursor: pointer;
        margin: 15px 0;
        box-shadow: 0 8px 0 #ccc;
      }
      #kick-me:active {
        transform: translateY(4px);
        box-shadow: 0 4px 0 #ccc;
      }
      #progress {
        height: 10px;
        background: #e74c3c;
        width: 100%;
        border-radius: 5px;
      }

      #start-btn {
        background: #2ecc71;
        border: none;
        padding: 15px 60px;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="menu-screen" class="screen active">
        <h2 style="margin: 0; color: #2ecc71">FOOTBALL STRATEGY</h2>
        <div class="currency-bar">
          <div class="xp-display">🔹 <span id="total-xp">0</span></div>
          <div class="coin-display">🟡 <span id="total-coins">0</span></div>
        </div>

        <div class="tree-viewport">
          <div
            id="l1"
            class="line"
            style="width: 2px; height: 60px; left: 374px; top: 350px"
          ></div>
          <div
            id="l2"
            class="line"
            style="width: 2px; height: 120px; left: 374px; top: 160px"
          ></div>
          <div
            id="node-click"
            class="skill-node visible"
            onclick="buy('click', 'xp')"
          >
            <small>УДАР</small><span id="lvl-click">1/10</span
            ><b class="price-xp" id="c-click">10</b>
          </div>
          <div id="node-crit" class="skill-node" onclick="buy('crit', 'xp')">
            <small>КРИТ</small><span id="lvl-crit">0/3</span
            ><b class="price-xp" id="c-crit">300</b>
          </div>
          <div id="node-auto" class="skill-node" onclick="buy('auto', 'xp')">
            <small>ДРУГ</small><span id="lvl-auto">0/5</span
            ><b class="price-xp" id="c-auto">100</b>
          </div>
          <div id="node-pro" class="skill-node" onclick="buy('pro', 'coin')">
            <small>ПРОФИ</small><span id="lvl-pro">0/5</span
            ><b class="price-coin" id="c-pro">20</b>
          </div>
          <div
            id="node-viewer"
            class="skill-node"
            onclick="buy('viewer', 'xp')"
          >
            <small>ЗРИТЕЛЬ</small><span id="lvl-viewer">0/5</span
            ><b class="price-xp" id="c-viewer">150</b>
          </div>
          <div id="node-fan" class="skill-node" onclick="buy('fan', 'coin')">
            <small>ФАНАТ</small><span id="lvl-fan">0/5</span
            ><b class="price-coin" id="c-fan">30</b>
          </div>
          <div id="node-attr" class="skill-node" onclick="buy('attr', 'coin')">
            <small>МЕРЧ</small><span id="lvl-attr">0/5</span
            ><b class="price-coin" id="c-attr">50</b>
          </div>
          <div
            id="node-drink"
            class="skill-node"
            onclick="buy('drink', 'coin')"
          >
            <small>НАПИТКИ</small><span id="lvl-drink">0/5</span
            ><b class="price-coin" id="c-drink">50</b>
          </div>
          <div
            id="node-delay"
            class="skill-node"
            onclick="buy('delay', 'coin')"
          >
            <small>ЗАДЕРЖКА</small><span id="lvl-delay">0/3</span
            ><b class="price-coin" id="c-delay">10</b>
          </div>
          <div id="node-time" class="skill-node" onclick="buy('time', 'coin')">
            <small>ВРЕМЯ</small><span id="lvl-time">0/5</span
            ><b class="price-coin" id="c-time">25</b>
          </div>
        </div>
        <button id="start-btn" onclick="startGame()">ИГРАТЬ</button>
      </div>

      <div id="game-screen" class="screen">
        <div style="background: #222; border-radius: 5px">
          <div id="progress"></div>
        </div>
        <div id="timer-text" style="margin: 5px">11.0с</div>
        <div style="font-size: 2rem">⚽ <b id="current-score">0</b></div>
        <button id="kick-me" onclick="handleKick()">⚽</button>
        <div id="game-stats" style="font-size: 0.8rem; opacity: 0.7"></div>
      </div>
    </div>

    <script>
      let data = {
        xp: 0,
        coins: 0,
        lvls: {
          click: 1,
          crit: 0,
          auto: 0,
          pro: 0,
          viewer: 0,
          fan: 0,
          attr: 0,
          drink: 0,
          delay: 0,
          time: 0,
        },
        max: {
          click: 10,
          crit: 3,
          auto: 5,
          pro: 5,
          viewer: 5,
          fan: 5,
          attr: 5,
          drink: 5,
          delay: 3,
          time: 5,
        },
        costs: {
          click: 10,
          crit: 300,
          auto: 100,
          pro: 20,
          viewer: 150,
          fan: 30,
          attr: 50,
          drink: 50,
          delay: 10,
          time: 25,
        },
      };

      let gameInterval, autoInterval, currentMs, maxMs;

      function updateUI() {
        document.getElementById("total-xp").innerText = Math.floor(data.xp);
        document.getElementById("total-coins").innerText = Math.floor(
          data.coins,
        );

        const nodes = [
          { id: "node-click", k: "click", cur: "xp", can: true },
          { id: "node-crit", k: "crit", cur: "xp", can: data.lvls.click >= 3 },
          { id: "node-auto", k: "auto", cur: "xp", can: data.lvls.click >= 2 },
          { id: "node-pro", k: "pro", cur: "coin", can: data.lvls.auto >= 5 },
          {
            id: "node-viewer",
            k: "viewer",
            cur: "xp",
            can: data.lvls.click >= 2,
            l: "l1",
          },
          {
            id: "node-fan",
            k: "fan",
            cur: "coin",
            can: data.lvls.viewer >= 5,
            l: "l2",
          },
          { id: "node-attr", k: "attr", cur: "coin", can: data.lvls.fan >= 1 },
          {
            id: "node-drink",
            k: "drink",
            cur: "coin",
            can: data.lvls.fan >= 1,
          },
          {
            id: "node-delay",
            k: "delay",
            cur: "coin",
            can: data.lvls.crit >= 1,
          },
          {
            id: "node-time",
            k: "time",
            cur: "coin",
            can: data.lvls.delay >= 1,
          },
        ];

        nodes.forEach((n) => {
          const el = document.getElementById(n.id);
          if (n.can) {
            el.classList.add("visible");
            if (n.l) document.getElementById(n.l).classList.add("visible");
          }

          const isMax = data.lvls[n.k] >= data.max[n.k];
          el.classList.toggle("maxed", isMax);
          document.getElementById("lvl-" + n.k).innerText = isMax
            ? "MAX"
            : `${data.lvls[n.k]}/${data.max[n.k]}`;
          document.getElementById("c-" + n.k).innerText = isMax
            ? "✓"
            : data.costs[n.k];

          if (!isMax) {
            let afford =
              n.cur === "xp"
                ? data.xp >= data.costs[n.k]
                : data.coins >= data.costs[n.k];
            el.classList.toggle("disabled", !afford);
          }
        });
      }

      function buy(type, cur) {
        if (data.lvls[type] >= data.max[type]) return;
        let cost = data.costs[type];
        if (
          (cur === "xp" && data.xp >= cost) ||
          (cur === "coin" && data.coins >= cost)
        ) {
          if (cur === "xp") data.xp -= cost;
          else data.coins -= cost;
          data.lvls[type]++;
          data.costs[type] = Math.ceil(data.costs[type] * 2.2);
          updateUI();
        }
      }

      function startGame() {
        data.score = 0;
        maxMs = (11 + data.lvls.time) * 1000;
        currentMs = maxMs;
        document.getElementById("menu-screen").classList.remove("active");
        document.getElementById("game-screen").classList.add("active");

        gameInterval = setInterval(() => {
          currentMs -= 100;
          document.getElementById("timer-text").innerText =
            (currentMs / 1000).toFixed(1) + "с";
          document.getElementById("progress").style.width =
            (currentMs / maxMs) * 100 + "%";
          if (currentMs <= 0) stopGame();
        }, 100);

        autoInterval = setInterval(() => {
          data.score += (data.lvls.auto * 2 + data.lvls.pro * 7) / 10;
          document.getElementById("current-score").innerText = Math.floor(
            data.score,
          );
        }, 100);
      }

      function stopGame() {
        clearInterval(gameInterval);
        clearInterval(autoInterval);

        // Расчет монет
        let coinGain = data.lvls.viewer + data.lvls.fan * 5; // База
        coinGain += data.lvls.attr * data.lvls.fan * 2; // Атрибутика
        coinGain += data.lvls.drink * (data.lvls.viewer + data.lvls.fan); // Напитки

        data.xp += Math.floor(data.score);
        data.coins += coinGain;

        alert(
          `Матч окончен!\nОпыт: +${Math.floor(data.score)}\nМонеты: +${coinGain}`,
        );
        document.getElementById("game-screen").classList.remove("active");
        document.getElementById("menu-screen").classList.add("active");
        updateUI();
      }

      function handleKick() {
        let p = data.lvls.click;
        if (Math.random() * 100 < data.lvls.crit * 15) p *= 3;
        if (Math.random() * 100 < data.lvls.delay * 10) currentMs += 1000;
        data.score += p;
        document.getElementById("current-score").innerText = Math.floor(
          data.score,
        );
      }

      updateUI();
    </script>
  </body>
</html>
