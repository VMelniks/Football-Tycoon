      /* ... (весь твой CSS без изменений до координат узлов) ... */
      body {
        background: #0d1f0d;
        color: white;
        /* ЗАМЕНЯЕМ ШРИФТ НА ПИКСЕЛЬНЫЙ */
        font-family: "Press Start 2P", cursive;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        user-select: none;
        /* Уменьшим базовый размер, так как пиксельные шрифты крупнее */
        font-size: 10px;
      }

      /* Применяем шрифт к конкретным блокам */
      .currency-bar,
      .stats-panel,
      #score-container,
      #game-coins {
        font-family: "Press Start 2P", cursive;
        /* Черная пиксельная обводка (резкая тень) */
        text-shadow:
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000,
          2px 2px 0 #000; /* И небольшая тень для объема */
      }

      /* Делаем шрифт в статах немного меньше, чтобы всё влезло */
      .stats-panel {
        font-size: 8px;
        line-height: 1.6;
      }
      .container {
        text-align: center;
        width: 1100px;

      /* Стили для экрана настройки */
#custom-screen {

    left: 0;

.custom-card {

/* Контейнер для предпросмотра */
/* 1. Увеличиваем высоту рамки, чтобы человечек влез целиком */
/* 1. Настройка контейнера */
.preview-box {
    width: 160px;
    height: 250px;
    position: relative;
    margin: 20px auto;
    background: #34495e;
    border: 3px solid #2ecc71;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    justify-content: center; /* Центрируем части тела внутри */
}

/* Базовый стиль для слоёв */
.player-part {
    position: absolute;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    width: 90%; 
    image-rendering: pixelated;
    left: 5%; 
}

.colored-part {
    background-blend-mode: multiply;
}

/* 2. Позиционирование по вертикали (оставляем как в прошлой правке) */
.p-head   { height: 85px; top: 10px;  z-index: 4; } 
.p-shirt  { height: 77px; top: 85px;  z-index: 3; } 
.p-shorts { height: 45px; top: 146px; z-index: 2; } 
.p-socks  { height: 50px; top: 180px; z-index: 1; }

/* Эффект покраски ткани (белый цвет станет выбранным) */
.colored-part {
    mix-blend-mode: multiply; /* Магия: красит белое, не трогает черное */
}
      .screen {
        display: none;
      }
      .active {
        display: block;
      }
      #game-screen {
        background-image: url("pole3.png"); /* Просто имя файла, без папок */
        background-size: 100% 100%;
        background-position: center;
        background-repeat: no-repeat;
        image-rendering: pixelated;
        /* ... остальные свойства ... */
      }
/* Контейнер всего футболиста */
/* 1. ГЛАВНЫЙ КОНТЕЙНЕР ИГРОКА НА ПОЛЕ */
.player-container {
    position: absolute;
    /* Размеры как у превью, чтобы части тела совпали */
    width: 160px;   
    height: 250px;  
    
    /* УВЕЛИЧЕНИЕ В 5 РАЗ */
    transform: scale(0.8); 
    /* Растим от центра нижней точки, чтобы он стоял на газоне */
    transform-origin: bottom center; 
    
    z-index: 10;
    pointer-events: none; /* Чтобы клики летели в мяч, а не в игрока */
}

/* 2. ПРАВИЛЬНАЯ СБОРКА ТЕЛА (чтобы не было зазоров) */
.player-container .player-part {
    position: absolute; /* Накладываем слои друг на друга */
    width: 90%;
    left: 5%;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    image-rendering: pixelated;
}

/* 3. КООРДИНАТЫ ЧАСТЕЙ (те самые 2px нахлеста, чтобы не развалился) */
/* 3. КООРДИНАТЫ ЧАСТЕЙ (с анимацией внутри) */

.player-container .p-head { 
    height: 87px; 
    top: 10px; 
    z-index: 4; 
    animation: headBob 2.5s infinite ease-in-out; 
} 

.player-container .p-shirt { 
    height: 77px; 
    top: 83px; 
    z-index: 3; 
    animation: bodyBreathe 3s infinite ease-in-out; 
    transform-origin: bottom center; 
}
.player-container .p-shorts { height: 47px; top: 143px; z-index: 2; } 
.player-container .p-socks  { height: 52px; top: 173px; z-index: 1; }

/* Твои сетки цветов и админка (оставляем как есть) */
.color-grid { display: flex; gap: 10px; justify-content: center; margin: 10px 0; }
.color-opt { width: 30px; height: 30px; border-radius: 5px; border: 2px solid #fff; cursor: pointer; }
/* Контейнер сетки */

.color-opt {
    width: 30px;
    height: 30px;
    border-radius: 5px;
    border: 2px solid #fff;
    cursor: pointer;
    transition: transform 0.1s;
}

.color-opt:hover {
    transform: scale(1.1);
}
/* Кнопка цвета */
.color-btn {
    width: 50px;
    height: 50px;
    border: none;
    cursor: pointer;
    border-radius: 4px;                    /* Легкое скругление самих квадратов */
    transition: transform 0.1s;
}

.color-btn:hover {
    transform: scale(1.1);                 /* Увеличиваем при наведении */
    z-index: 10;
}

/* Активный (выбранный) цвет */
.color-btn.active {
    outline: 3px solid white;
    outline-offset: -4px;
}

        }
        20% {
          opacity: 1;
          transform: translateY(-20px) scale(1.2);

      .skill-node {
        position: absolute;
        width: 90px;
        height: 90px;

        border-radius: 14px;

        border: 3px solid #ffffff !important;

      /* Этот стиль будет работать только для того, что лежит внутри тега с классом xp-icon */
      .xp-icon {
        color: #3498db; /* Насыщенный синий */
        text-shadow:
          1px 1px 0px #fff,

      .timer-container {
        position: relative;
        display: inline-block;
      }
      #timer-text {
        /* 1. Твой пиксельный шрифт (замени 'Press Start 2P' на свой, если другой) */
        font-family: "Press Start 2P", cursive;

        /* 2. Размер (чуть больше, чтобы читалось) */
        font-size: 28px;

        /* 3. Цвет (ярко-белый или желтый) */
        color: #f7e708;

        /* 4. "Жирность" через пиксельную обводку (Shadow) */
        /* Рисуем жесткие тени во все стороны на 2 пикселя */
        text-shadow:
          -2px -2px 0 #000,
          2px -2px 0 #000,
          -2px 2px 0 #000,
          2px 2px 0 #000,
          4px 4px 0 rgba(0, 0, 0, 0.5); /* Глубокая тень для объема */

        /* 5. Убираем сглаживание, чтобы пиксели были острыми */
        image-rendering: pixelated;
        font-smooth: never;
        -webkit-font-smoothing: none;
      }

/* Контейнер для анимации Друга */
#friend-animation {
    display: none; /* По умолчанию скрыт */
    position: absolute;
    /* Координаты, где он появится (например, рядом с мячом) */
    left: 70%; 
    top: 60%;
    transform: translate(-50%, -50%); /* Центрируем */
    
    /* Эти размеры JS будет менять динамически, */
    /* но начальные можно поставить про запас */

    height: 155px;
    
    background-repeat: no-repeat;
    image-rendering: pixelated; /* Чтобы пиксель-арт был четким */

}



.stopwatch-container {
        width: 140px; /* Установи желаемый размер секундомера на экране */
        margin: 15px auto;
        position: relative; /* Чтобы стрелка позиционировалась относительно контейнера */

        /* Черная пиксельная тень для объема */
        filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.6));
      }

      .stopwatch-case {
        width: 100%;
        height: 100%;
        display: block;

        /* ВКЛЮЧАЕМ ПИКСЕЛЬНЫЙ РЕНДЕРИНГ */
        image-rendering: pixelated;
        image-rendering: crisp-edges; /* Для Safari */
      }

      .stopwatch-arrow-svg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none; /* Чтобы клики проходили сквозь SVG */
      }

      #stopwatch-hand {
        /* Точка вращения теперь — центр контейнера (50px 50px в SVG-координатах) */
        transform-origin: 50px 60px;
      }#ball-container {
  position: relative;
  z-index: 999; /* Выносим мяч на самый верхний слой, чтобы ничто его не перекрывало */
  text-align: center;
  margin-top: 20px; /* Отступ от секундомера, чтобы не слипались */
}

#ball {
  width: 120px;
  height: auto;
  cursor: pointer;
  image-rendering: pixelated;
  transition: transform 0.1s ease-out; /* Плавный поворот */
  display: block;
  margin: 15px auto;
  
  /* ВОТ ЭТА СТРОЧКА ВАЖНА: она связывает JS и CSS */
  transform: rotate(var(--angle, 0deg)); 
  
  /* Оставляем твою анимацию покачивания */
  animation: ballIdle 4s ease-in-out infinite;
  z-index: 999;
  position: relative;
}

#ball:active {
  /* При нажатии мяч чуть сжимается, сохраняя угол поворота */
  transform: rotate(var(--angle, 0deg)) scale(0.9);
}

/* На всякий случай: делаем другие контейнеры "сквозными", 
   если они вдруг налезают на мяч */
.stopwatch-container, .timer-container {
  pointer-events: none; 
}
/* Но внутри них кнопки (если есть) должны работать */
.stopwatch-container *, .timer-container * {
  pointer-events: auto;
}

}

// 5. Отрисовка игрока на поле
function createVisualPlayer(percentX, percentY, headNum, sShirt, sShorts, sSocks) {
    const field = document.getElementById('game-screen');
    if (!field) return;

    const player = document.createElement('div');
    player.className = 'player-container';
    player.style.left = percentX + '%';
    player.style.top = percentY + '%';

    player.innerHTML = `
        <div class="player-part p-socks" style="background-image: url('players/socks_${sSocks}.png');"></div>
        <div class="player-part p-shorts" style="background-image: url('players/shorts_${sShorts}.png');"></div>
        <div class="player-part p-shirt" style="background-image: url('players/shirt_${sShirt}.png');"></div>
        <div class="player-part p-head" style="background-image: url('players/head${headNum}.png');"></div>
    `;

}

// Твой код для дерева навыков ниже (оставил без изменений)
function initTree() {
    const tree = document.getElementById("tree");
    if (!tree) return;
    nodeData.forEach((n) => {
        const div = document.createElement("div");
        div.id = n.id;
        div.className = "skill-node";
        div.title = n.desc;
        div.onclick = () => buy(n.k, n.cur);
        div.innerHTML = `<small>${n.name}</small><span id="lvl-${n.k}">0/0</span><b class="price-${n.cur}" id="c-${n.k}">0</b>`;
        tree.appendChild(div);
    });
}

      function updateUI() {
        document.getElementById("total-xp").innerText = Math.floor(data.xp);
        document.getElementById("total-coins").innerText = Math.floor(
          data.coins,
        );
        nodeData.forEach((n) => {
          const el = document.getElementById(n.id);
          const isMax = data.lvls[n.k] >= data.max[n.k];
          let canSee = false;

          // ЛОГИКА ВИДИМОСТИ
          if (n.k === "click") canSee = true;
          if (
            n.k === "friend" ||
            n.k === "equip" ||
            n.k === "crit" ||
            n.k === "delay"
          )
            canSee = data.lvls.click >= 2;
          if (n.k === "fCrit" || n.k === "viewer") canSee = data.lvls.friend >= 1;
          if (n.k === "fCoin") canSee = data.lvls.fCrit >= 1;
          if (n.k === "footy") canSee = data.lvls.equip >= 1;
          if (n.k === "time" || n.k === "timeCoin")
            canSee = data.lvls.delay >= 1;
          if (n.k === "midas" || n.k === "cCoin") canSee = data.lvls.crit >= 1;
          if (n.k === "moreCoins") canSee = data.lvls.cCoin >= 1;

          // Ветка Мидаса
          if (n.k === "midasSpeed") canSee = data.lvls.midas >= 1;
          if (n.k === "mCrit") canSee = data.lvls.midas >= 1;
          // Ветка фанатов
          if (n.k === "vStand" || n.k === "fan" || n.k === "vLuck")
            canSee = data.lvls.viewer >= 1;
          if (n.k === "attr" || n.k === "drink" || n.k === "fSec")
            canSee = data.lvls.fan >= 1;

          if (n.k === "reward" || n.k === 'coach') canSee = data.lvls.footy >= 1;
          if (n.k === "bigReward" || n.k === 'team') canSee = data.lvls.reward >= 1;

          if (canSee) el.classList.add("visible");
          el.classList.toggle("maxed", isMax);
          document.getElementById(`lvl-${n.k}`).innerText = isMax
            ? "MAX"
            : `${data.lvls[n.k]}/${data.max[n.k]}`;
          let icon = n.cur === "xp" ? "🔹" : "🟡";
          document.getElementById(`c-${n.k}`).innerHTML = isMax
            ? "✓"
            : n.k === "team"
              ? `🟡 10k<br>🔹100k`
              : `${icon} ${data.costs[n.k]}`;
          if (!isMax) {
            let afford =
              (n.cur === "xp" ? data.xp : data.coins) >= data.costs[n.k];
            el.classList.toggle("disabled", !afford);
          }
        });
      }

      function buy(type, cur) {
        // 1. Проверка на макс. уровень
        if (data.lvls[type] >= data.max[type]) return;

        // 2. Логика для "Команды" (Две валюты)
        if (type === "team") {
          const costCoin = 10000;
          const costXP = 100000;

          if (data.coins >= costCoin && data.xp >= costXP) {
            data.coins -= costCoin;
            data.xp -= costXP;
            data.lvls[type]++;
            updateUI();

            // Всплывающее окно
            alert(
              "🏆 ПОЗДРАВЛЯЕМ!\n\n" +
                "Вы успешно прошли ДЕМО-ВЕРСИЮ Football Tycoon!\n" +
                "Ваш путь от любителя до владельца клуба завершен.\n\n" +
                "Добро пожаловать в Профессиональный режим! Теперь вы — часть большой игры.",
            );
          } else {
            alert(
              `Чтобы собрать свою команду, нужно накопить:\n🟡 ${costCoin} монет и 🔹 ${costXP} опыта!`,
            );
          }
          return;
          // Выходим из функции
        }

        // 3. Стандартная логика для остальных навыков
        let currencyKey = cur === "xp" ? "xp" : "coins";

        if (data[currencyKey] >= data.costs[type]) {
          data[currencyKey] -= data.costs[type];
          data.lvls[type]++;

          // Увеличиваем цену (кроме тех, где это не нужно)
          data.costs[type] = Math.ceil(data.costs[type] * 1.8);

          updateUI();
        }
      }

      let gInt, aInt, bInt, curMs, totalEl, sCoins, sClick, sFriend, xpForCoin;

      function startGame() {
        if (data.lvls.friend > 0) {
        startFriend();}
        sClick = sFriend = sCoins = totalEl = xpForCoin = 0;
        let maxT = (11 + data.lvls.time) * 1000;
        curMs = maxT;
        document.getElementById("admin-ui").style.display = "none";
        document.getElementById("menu-screen").classList.remove("active");
        document.getElementById("game-screen").classList.add("active");
        

        gInt = setInterval(() => {
          curMs -= 10;
          totalEl += 10;
          document.getElementById("timer-text").innerText = fmt(curMs);
          let angle = (curMs / maxT) * 360;
          document.getElementById("stopwatch-hand").style.transform =
            `rotate(${angle}deg)`;
          if (curMs <= 0) stopGame();
          
          
        }, 10);

aInt = setInterval(() => {
    // Считаем общую мощь тренера: (кол-во футболистов) * (уровень тренера * 3)
    let coachPower = (data.lvls.footy || 0) * ((data.lvls.coach || 0) * 3);
    
    // Прибавляем к общей сумме
    sFriend += (data.lvls.friend * 2 + (data.lvls.footy * 5 + coachPower)) / 10;

    let totalNow = sClick + sFriend;
    document.getElementById("current-score").innerText = Math.floor(totalNow);
}, 100);

        // ИНТЕРВАЛ МИДАСА ТЕПЕРЬ ЗАВИСИТ ОТ СКОРОСТИ
        // База 5000мс, каждый уровень убирает 1000мс.
        let midasInterval = 5000 - data.lvls.midasSpeed * 1000;

        bInt = setInterval(() => {
          let b = 0;
          // Логика Мидаса
          if (
            data.lvls.midas > 0 &&
            Math.random() * 100 < data.lvls.midas * 20
          ) {
            // Шанс крита дохода 10, 20, 30%
            b += Math.random() * 100 < [0, 10, 20, 30][data.lvls.mCrit] ? 2 : 1;
          }

        

          if (b > 0) {
            sCoins += b;
            spawnFloatingText(
              "+" + b,
              window.innerWidth / 2 + 50,

            );
            document.getElementById("game-coins").innerText = `🟡 ${sCoins}`;
          }
        }, midasInterval);

       // Внутри того блока, который ты скинул:
const vC = data.lvls.viewer + data.lvls.vStand * 10;
const fC = data.lvls.fan + data.lvls.fSec * 10;

// Считаем бонус тренера отдельно для ясности:
const coachBonusTotal = data.lvls.footy * (data.lvls.coach * 3);

document.getElementById("live-stats").innerHTML = `
    <div class="stats-item">Сила удара <b>${data.lvls.click + data.lvls.equip * 5} <span class="xp-icon">🔹</span></b></div>
    <div class="stats-item">Партнёры <b>${data.lvls.friend * 2 + data.lvls.footy * 5 + coachBonusTotal}<span class="xp-icon">🔹</span>/с</b></div>

    <div class="stats-item">Базовый доход <b>${vC * 2 + fC * 4}🟡/матч</b></div>
`;
      }
      function handleKick(event) {
  // 1. Ищем новый ID мяча (был kick-me, стал ball)
  let ball = document.getElementById("ball");
  
  // Поворот мяча (если мяч найден, крутим его)
  if (ball) {
    let randomDeg = Math.floor(Math.random() * 360) - 180;
    ball.style.setProperty("--angle", randomDeg + "deg");
  }

  // 2. Расчет силы (база + экипировка)
  let p = data.lvls.click + (data.lvls.equip * 5);
  let isCrit = false;

  // 3. Логика КРИТА
  if (Math.random() * 100 < data.lvls.crit * 10) {
    p *= 3;
    isCrit = true;
    
    // Шанс на монету при крите
    if (Math.random() * 100 < [0, 25, 50, 75][data.lvls.cCoin]) {
      let bonusAmount = 1 + data.lvls.moreCoins;
      sCoins += bonusAmount;
      spawnFloatingText("+" + bonusAmount, event.clientX + 40, event.clientY - 20, "coin");
    }
  }

  // 4. Проверка на "Затяжку времени"
  if (Math.random() * 100 < [0, 0.5, 1, 2][data.lvls.delay]) {
    curMs += 1000; 

    // Время - деньги
    if (data.lvls.timeCoin > 0) {
      let bonus = data.lvls.timeCoin;
      sCoins += bonus;
      spawnFloatingText("+" + bonus, event.clientX + 60, event.clientY + 20, "coin");
    }

    let b = document.getElementById("time-bonus");
    if (b) {
      b.classList.add("show-bonus");
      setTimeout(() => b.classList.remove("show-bonus"), 500);
    }
  }

  // 5. Начисление и обновление экрана
  sClick += p;
  let totalNow = sClick + sFriend;
  
  const scoreEl = document.getElementById("current-score");
  const coinsEl = document.getElementById("game-coins");
  
  if (scoreEl) scoreEl.innerText = Math.floor(totalNow);
  if (coinsEl) coinsEl.innerText = `🟡 ${Math.floor(sCoins)}`;

  // 6. Вылет текста (используем clientX/Y для точности)
  spawnFloatingText("+" + p, event.clientX, event.clientY, isCrit ? "crit" : "xp");

  // 7. Награда за достижение XP (бонусные монеты)
  if (data.lvls.reward > 0) {
    let threshold = 1000 - (data.lvls.reward * 100);
    if (totalNow >= xpForCoin + threshold) {
      let bonus = 1 + data.lvls.bigReward;
      sCoins += bonus;
      xpForCoin += threshold;
      spawnFloatingText("+" + bonus, event.clientX - 40, event.clientY - 40, "coin");
    }
  }
}

      function stopGame() {
    // 1. Остановка таймеров
    clearInterval(gInt);
    clearInterval(aInt);
    clearInterval(bInt);

    // 2. Считаем людей (Зрители и Фанаты)
    let vC = (data.lvls.viewer || 0) + (data.lvls.vStand || 0) * 10;
    let fC = (data.lvls.fan || 0) + (data.lvls.fSec || 0) * 10;
    let totalPeople = vC + fC;

    // 3. Базовый доход (Билеты)
    let cBase = (vC * 2) + (fC * 4);

    // 4. Чаевые (Удача)
    let luckChance = (data.lvls.vLuck || 0) * 30; 
    let luckMoney = 0;
    for (let i = 0; i < totalPeople; i++) {
        if (Math.random() * 100 < luckChance) {
            luckMoney++;
        }
    }
clearInterval(friendAnimationInterval);
friendAnimationInterval = null;

document.getElementById('friend-animation').style.display = 'none';
    // 5. Дополнительный доход (Напитки и Атрибутика)
    let drinkMoney = 0;
    let attrMoney = 0;
    let dCh = [0, 30, 60, 90][data.lvls.drink || 0] || 0;
    let aCh = [0, 30, 60, 90][data.lvls.attr || 0] || 0;

    // Считаем напитки (пьют все)
    for (let i = 0; i < totalPeople; i++) {
        if (Math.random() * 100 < dCh) drinkMoney++;
    }
    // Считаем атрибутику (только фанаты)
    for (let i = 0; i < fC; i++) {
        if (Math.random() * 100 < aCh) attrMoney += 2;
    }

    // Общий бонус для вывода в старую строку (если нужно)
    let cExtra = drinkMoney + attrMoney;

    // 6. Итоговые расчеты
    let totalXP = Math.floor(sClick + sFriend);
    let totalMatchCoins = sCoins + cBase + cExtra + luckMoney;

    // 7. Вывод данных в UI (Безопасно проверяем наличие элементов)
    const setVal = (id, val) => {
        const el = document.getElementById(id);
        if (el) el.innerText = val;
    };

    setVal("res-time", (totalEl / 1000).toFixed(1) + "s");
    
    // XP
    setVal("res-xp-total", totalXP);
    setVal("res-xp-click", Math.floor(sClick));
    setVal("res-xp-friend", Math.floor(sFriend));

    // Монеты
    setVal("res-coin-total", totalMatchCoins);
    setVal("res-coin-base", cBase);
    setVal("res-coin-luck", (sCoins + luckMoney));
    
    // Бонусы по отдельности (те самые строки, что вызывали ошибку)
    setVal("res-coin-drink", drinkMoney);
    setVal("res-coin-attr", attrMoney);

    // 8. Сохранение прогресса
    data.xp += totalXP;
    data.coins += totalMatchCoins;

    // --- ЛОГИКА ДИНАМИЧЕСКОГО ОКНА ---

    // 1. Показываем Билеты, если куплены Зрители или Трибуны
    if (data.lvls.viewer > 0 || data.lvls.vStand > 0 || data.lvls.fan > 0) {
        document.getElementById("res-section-coin").style.display = "block";
        document.getElementById("row-res-base").style.display = "flex";
    }

    // 2. Показываем Удачу, если куплен Мидас, Крит или Удача зрителей
    if (data.lvls.midas > 0 || data.lvls.vLuck > 0 || data.lvls.cCoin > 0) {
        document.getElementById("res-section-coin").style.display = "block";
        document.getElementById("row-res-luck").style.display = "flex";
    }

    // 3. Показываем Напитки
    if (data.lvls.drink > 0) {
        document.getElementById("row-res-drink").style.display = "flex";
    }

    // 4. Показываем Атрибутику
    if (data.lvls.attr > 0) {
        document.getElementById("row-res-attr").style.display = "flex";
    }

    // 5. Показываем Итоговую строку монет, если доход больше 0
    if (totalMatchCoins > 0) {
        document.getElementById("row-res-total-coin").style.display = "flex";
    }

    // 9. Показываем окно результатов
    const overlay = document.getElementById("summary-overlay");
    if (overlay) overlay.style.display = "flex";
}

      function closeSummary() {
        
    document.getElementById("summary-overlay").style.display = "none";
    
    
    // Сбрасываем видимость всех динамических строк
    const idsToHide = [
        "res-section-coin", "row-res-base", "row-res-luck", 
        "row-res-drink", "row-res-attr", "row-res-total-coin"
    ];
    idsToHide.forEach(id => {
        let el = document.getElementById(id);
        if (el) el.style.display = "none";
    });

    document.getElementById("game-screen").classList.remove("active");
    document.getElementById("menu-screen").classList.add("active");
    document.getElementById("admin-ui").style.display = "flex";
    updateUI();
    
}

      function fmt(ms) {
        let t = Math.max(0, ms);
        let m = Math.floor(t / 60000);
        let s = Math.floor((t % 60000) / 1000);
        let c = Math.floor((t % 1000) / 10);
        return `${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}:${c.toString().padStart(2, "0")}`;
      }

      initTree();
      updateUI();
