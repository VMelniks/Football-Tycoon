<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Football Tycoon: Balanced Edition</title>
    <style>
        body { 
            background: #0d1f0d; color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; user-select: none;
        }
        .container { text-align: center; width: 950px; }
        .screen { display: none; }
        .active { display: block; }
        
        .currency-bar { display: flex; justify-content: center; gap: 30px; margin-bottom: 10px; padding: 10px; background: rgba(0,0,0,0.4); border-radius: 30px; border: 1px solid #2ecc71; }
        .xp-val { color: #3498db; font-weight: bold; font-size: 1.3rem; }
        .coin-val { color: #f1c40f; font-weight: bold; font-size: 1.3rem; }

        .tree-viewport {
            position: relative; height: 500px; width: 900px; margin: 10px auto;
            background: rgba(0,0,0,0.5); border-radius: 20px; border: 2px solid #2ecc71;
            overflow: hidden;
        }

        .skill-node {
            position: absolute; width: 90px; height: 90px;
            background: #27ae60; border: 2px solid #0d1f0d; border-radius: 12px;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; z-index: 5; line-height: 1.1;
        }
        .skill-node.visible { display: flex; }
        .skill-node.disabled { background: #333 !important; opacity: 0.5; cursor: not-allowed; }
        .skill-node.maxed { background: #f1c40f !important; color: #000; border-color: #fff; cursor: default; }
        
        .skill-node small { font-size: 0.55rem; text-transform: uppercase; margin-bottom: 4px; font-weight: bold; }
        .skill-node span { font-size: 0.85rem; }
        .price-xp { color: #3498db; font-size: 0.75rem; font-weight: bold; margin-top: 4px; }
        .price-coin { color: #f1c40f; font-size: 0.75rem; font-weight: bold; margin-top: 4px; }

        /* Сетка позиций */
        #node-click   { left: 405px; top: 390px; }
        #node-auto    { left: 240px; top: 390px; }
        #node-pro     { left: 100px; top: 390px; }
        #node-crit    { left: 570px; top: 390px; }
        #node-delay   { left: 710px; top: 390px; }
        #node-midas   { left: 810px; top: 270px; }
        #node-time    { left: 710px; top: 270px; }

        #node-viewer  { left: 405px; top: 270px; }
        #node-v-stand { left: 240px; top: 270px; }
        #node-v-luck  { left: 570px; top: 270px; }

        #node-fan     { left: 405px; top: 150px; }
        #node-f-stand { left: 240px; top: 150px; }
        #node-f-luck  { left: 570px; top: 150px; }

        #node-attr    { left: 330px; top: 30px; }
        #node-drink   { left: 480px; top: 30px; }

        /* ИГРА */
        #game-screen { background: #1a4a1a; border-radius: 20px; padding: 20px; border: 4px solid #2ecc71; position: relative; }
        .stats-panel { position: absolute; top: 20px; right: 20px; text-align: right; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; font-size: 0.8rem; border: 1px solid #2ecc71; }
        .stats-panel b { color: #2ecc71; }
        
        #kick-me { width: 120px; height: 120px; border-radius: 50%; background: white; font-size: 3.5rem; border: none; cursor: pointer; box-shadow: 0 8px 0 #ccc; margin: 10px 0; }
        #kick-me:active { transform: translateY(4px); box-shadow: 0 4px 0 #ccc; }
        #progress { height: 10px; background: #e74c3c; width: 100%; border-radius: 5px; }
        #start-btn { background: #2ecc71; border: none; padding: 15px 60px; font-weight: bold; border-radius: 50px; cursor: pointer; color: #fff; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-screen" class="screen active">
        <h2 style="margin:5px; color: #2ecc71;">FOOTBALL TYCOON PRO</h2>
        <div class="currency-bar">
            <div class="xp-val">🔹 <span id="total-xp">0</span> XP</div>
            <div class="coin-val">🟡 <span id="total-coins">0</span> COINS</div>
        </div>
        
        <div class="tree-viewport">
            <div id="node-click" class="skill-node visible" onclick="buy('click', 'xp')"><small>УДАР</small><span id="lvl-click">1/10</span><b class="price-xp" id="c-click">10</b></div>
            <div id="node-auto" class="skill-node" onclick="buy('auto', 'xp')"><small>ДРУГ</small><span id="lvl-auto">0/5</span><b class="price-xp" id="c-auto">100</b></div>
            <div id="node-crit" class="skill-node" onclick="buy('crit', 'xp')"><small>КРИТ</small><span id="lvl-crit">0/3</span><b class="price-xp" id="c-crit">300</b></div>
            <div id="node-viewer" class="skill-node" onclick="buy('viewer', 'xp')"><small>ЗРИТЕЛЬ</small><span id="lvl-viewer">0/5</span><b class="price-xp" id="c-viewer">150</b></div>

            <div id="node-pro" class="skill-node" onclick="buy('pro', 'coin')"><small>ПРОФИ</small><span id="lvl-pro">0/5</span><b class="price-coin" id="c-pro">50</b></div>
            <div id="node-v-luck" class="skill-node" onclick="buy('vLuck', 'coin')"><small>ЩЕДРОСТЬ</small><span id="lvl-vLuck">0/3</span><b class="price-coin" id="c-vLuck">20</b></div>
            <div id="node-v-stand" class="skill-node" onclick="buy('vStand', 'coin')"><small>ТРИБУНА</small><span id="lvl-vStand">0/5</span><b class="price-coin" id="c-vStand">100</b></div>

            <div id="node-fan" class="skill-node" onclick="buy('fan', 'coin')"><small>ФАНАТ</small><span id="lvl-fan">0/5</span><b class="price-coin" id="c-fan">250</b></div>
            <div id="node-f-luck" class="skill-node" onclick="buy('fLuck', 'coin')"><small>ДОНАТЫ</small><span id="lvl-fLuck">0/3</span><b class="price-coin" id="c-fLuck">100</b></div>
            <div id="node-f-stand" class="skill-node" onclick="buy('fStand', 'coin')"><small>ФАН-СЕКТОР</small><span id="lvl-fStand">0/5</span><b class="price-coin" id="c-fStand">500</b></div>

            <div id="node-attr" class="skill-node" onclick="buy('attr', 'coin')"><small>АТРИБУТИКА</small><span id="lvl-attr">0/5</span><b class="price-coin" id="c-attr">150</b></div>
            <div id="node-drink" class="skill-node" onclick="buy('drink', 'coin')"><small>НАПИТКИ</small><span id="lvl-drink">0/5</span><b class="price-coin" id="c-drink">150</b></div>

            <div id="node-delay" class="skill-node" onclick="buy('delay', 'coin')"><small>ЗАДЕРЖКА</small><span id="lvl-delay">0/3</span><b class="price-coin" id="c-delay">50</b></div>
            <div id="node-time" class="skill-node" onclick="buy('time', 'coin')"><small>ВРЕМЯ</small><span id="lvl-time">0/5</span><b class="price-coin" id="c-time">100</b></div>
            <div id="node-midas" class="skill-node" onclick="buy('midas', 'coin')"><small>МИДАС</small><span id="lvl-midas">0/5</span><b class="price-coin" id="c-midas">200</b></div>
        </div>
        <button id="start-btn" onclick="startGame()">ВЫЙТИ НА ПОЛЕ</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="stats-panel" id="live-stats"></div>
        
        <div style="background:#222; border-radius:5px; width:60%; margin:auto;"><div id="progress"></div></div>
        <div id="timer-text" style="margin:5px">15.0с</div>
        <div style="font-size: 2.5rem; font-weight: bold;">⚽ <span id="current-score">0</span></div>
        <button id="kick-me" onclick="handleKick()">⚽</button>
        <div id="game-coins" style="color:#f1c40f; font-weight:bold;">Монет накоплено: 0</div>
    </div>
</div>

<script>
    let data = {
        xp: 0, coins: 0,
        lvls: { click: 1, auto: 0, pro: 0, crit: 0, delay: 0, time: 0, viewer: 0, vLuck: 0, vStand: 0, fan: 0, fLuck: 0, fStand: 0, attr: 0, drink: 0, midas: 0 },
        max:  { click: 10, auto: 5, pro: 5, crit: 3, delay: 3, time: 5, viewer: 5, vLuck: 3, vStand: 5, fan: 5, fLuck: 3, fStand: 5, attr: 5, drink: 5, midas: 5 },
        costs: { click: 10, auto: 100, pro: 50, crit: 300, delay: 50, time: 100, viewer: 150, vLuck: 20, vStand: 100, fan: 250, fLuck: 100, fStand: 500, attr: 150, drink: 150, midas: 200 }
    };

    let gameInterval, autoInterval, midasInterval, currentMs, maxMs, sessionCoins;

    function updateUI() {
        document.getElementById('total-xp').innerText = Math.floor(data.xp);
        document.getElementById('total-coins').innerText = Math.floor(data.coins);
        
        const nodes = [
            { id: 'node-click', k: 'click', cur: 'xp', can: true },
            { id: 'node-auto', k: 'auto', cur: 'xp', can: data.lvls.click >= 2 },
            { id: 'node-pro', k: 'pro', cur: 'coin', can: data.lvls.auto >= 5 },
            { id: 'node-crit', k: 'crit', cur: 'xp', can: data.lvls.click >= 3 },
            { id: 'node-viewer', k: 'viewer', cur: 'xp', can: data.lvls.click >= 2 },
            { id: 'node-v-luck', k: 'vLuck', cur: 'coin', can: data.lvls.viewer >= 1 },
            { id: 'node-v-stand', k: 'vStand', cur: 'coin', can: data.lvls.viewer >= 1 },
            { id: 'node-fan', k: 'fan', cur: 'coin', can: data.lvls.viewer >= 5 },
            { id: 'node-f-luck', k: 'fLuck', cur: 'coin', can: data.lvls.fan >= 1 },
            { id: 'node-f-stand', k: 'fStand', cur: 'coin', can: data.lvls.fan >= 1 },
            { id: 'node-attr', k: 'attr', cur: 'coin', can: data.lvls.fan >= 1 },
            { id: 'node-drink', k: 'drink', cur: 'coin', can: data.lvls.viewer >= 1 },
            { id: 'node-delay', k: 'delay', cur: 'coin', can: data.lvls.crit >= 1 },
            { id: 'node-time', k: 'time', cur: 'coin', can: data.lvls.delay >= 1 },
            { id: 'node-midas', k: 'midas', cur: 'coin', can: data.lvls.time >= 1 }
        ];

        nodes.forEach(n => {
            const el = document.getElementById(n.id);
            if(n.can) el.classList.add('visible');
            const isMax = data.lvls[n.k] >= data.max[n.k];
            el.classList.toggle('maxed', isMax);
            document.getElementById('lvl-'+n.k).innerText = isMax ? "MAX" : `${data.lvls[n.k]}/${data.max[n.k]}`;
            document.getElementById('c-'+n.k).innerText = isMax ? "✓" : data.costs[n.k];
            if(!isMax) {
                let afford = (n.cur === 'xp') ? (data.xp >= data.costs[n.k]) : (data.coins >= data.costs[n.k]);
                el.classList.toggle('disabled', !afford);
            }
        });
    }

    function buy(type, cur) {
        if(data.lvls[type] >= data.max[type]) return;
        let cost = data.costs[type];
        if((cur === 'xp' && data.xp >= cost) || (cur === 'coin' && data.coins >= cost)) {
            if(cur === 'xp') data.xp -= cost; else data.coins -= cost;
            data.lvls[type]++;
            data.costs[type] = Math.ceil(data.costs[type] * 2.2);
            updateUI();
        }
    }

    function startGame() {
        data.score = 0;
        sessionCoins = 0;
        maxMs = (15 + data.lvls.time) * 1000;
        currentMs = maxMs;
        
        document.getElementById('menu-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        
        // Статистика в реальном времени
        const vC = data.lvls.viewer + (data.lvls.vStand * 10);
        const fC = data.lvls.fan + (data.lvls.fStand * 10);
        document.getElementById('live-stats').innerHTML = `
            Удар: <b>${data.lvls.click}</b><br>
            Крит: <b>${data.lvls.crit * 10}%</b><br>
            Задержка: <b>${data.lvls.delay * 10}%</b><br>
            Доход: <b>${(vC*1)+(fC*5)} 🟡</b>
        `;

        gameInterval = setInterval(() => {
            currentMs -= 100;
            document.getElementById('timer-text').innerText = (currentMs/1000).toFixed(1) + 'с';
            document.getElementById('progress').style.width = (currentMs/maxMs)*100 + '%';
            if(currentMs <= 0) stopGame();
        }, 100);

        autoInterval = setInterval(() => {
            data.score += (data.lvls.auto * 2 + data.lvls.pro * 10) / 10;
            document.getElementById('current-score').innerText = Math.floor(data.score);
        }, 100);

        // МИДАС: Шанс каждые 5 сек
        midasInterval = setInterval(() => {
            if(data.lvls.midas > 0 && Math.random() * 100 < data.lvls.midas) {
                sessionCoins++;
                document.getElementById('game-coins').innerText = `Монет накоплено: ${sessionCoins}`;
            }
        }, 5000);
    }

    function stopGame() {
        clearInterval(gameInterval); clearInterval(autoInterval); clearInterval(midasInterval);
        
        let vCount = data.lvls.viewer + (data.lvls.vStand * 10);
        let fCount = data.lvls.fan + (data.lvls.fStand * 10);
        let finalCoins = sessionCoins + (vCount * 1) + (fCount * 5);
        
        // Бонусы Маркетинга
        finalCoins += (data.lvls.attr * fCount * 3); 
        finalCoins += (data.lvls.drink * (vCount + fCount));

        if(Math.random()*100 < data.lvls.vLuck * 5) finalCoins += vCount;
        if(Math.random()*100 < data.lvls.fLuck * 5) finalCoins += fCount * 3;
        
        data.xp += Math.floor(data.score);
        data.coins += finalCoins;
        
        alert(`Матч завершен!\nXP: +${Math.floor(data.score)}\nМонеты: +${finalCoins}`);
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('menu-screen').classList.add('active');
        updateUI();
    }

    function handleKick() {
        let p = data.lvls.click;
        if(Math.random()*100 < data.lvls.crit * 10) p *= 3;
        if(Math.random()*100 < data.lvls.delay * 10) currentMs += 1000;
        data.score += p;
        document.getElementById('current-score').innerText = Math.floor(data.score);
    }

    updateUI();
</script>
</body>
</html>
